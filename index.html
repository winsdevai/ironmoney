<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronMoney - Gestión Financiera</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <!-- ========================================= -->
    <!-- CÓDIGO PARA INSTALAR COMO APP EN CELULAR -->
    <!-- ========================================= -->
    
    <!-- Configuración para iPhone (Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="IronMoney">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3135/3135715.png">

    <!-- Configuración para Android (Chrome) -->
    <meta name="theme-color" content="#0f172a">
    
    <!-- Manifiesto de instalación integrado (Truco de una sola línea) -->
    <link rel="manifest" href='data:application/manifest+json;base64,eyJuYW1lIjoiSXJvbk1vbmV5Iiwic2hvcnRfbmFtZSI6IlyJvbk1vbmV5Iiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiMwZjE3MmEiLCJ0aGVtZV9jb2xvciI6IiMwZjE3MmEiLCJpY29ucyI6W3sic3JjIjoiaHR0cHM6Ly9jZG4taWNvbnMtcG5nLmZsYXRpY29uLmNvbS81MTIvMzEzNS8zMTM1NzE1LnBuZyIsInNpemVzIjoiMTkyeDE5MiIsInR5cGUiOiJpbWFnZS9wbmcifV19'>

    <style>
        :root {
            --bg-body: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #334155;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --goal: #8b5cf6;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding-bottom: 40px; }

        /* Header */
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 40px; background-color: var(--bg-card); border-bottom: 1px solid #334155; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); }
        .settings-btn { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .settings-btn:hover { color: var(--text-main); transform: rotate(90deg); }

        /* Container */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section-title { font-size: 1.1rem; color: var(--text-muted); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        /* Cards Grid */
        .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background-color: var(--bg-card); border-radius: var(--border-radius); padding: 20px; box-shadow: var(--shadow); cursor: pointer; transition: transform 0.2s; border: 1px solid transparent; }
        .card:hover { transform: translateY(-4px); border-color: var(--accent); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-title { font-size: 1.1rem; font-weight: 600; }
        .card-icon { color: var(--text-muted); font-size: 1.2rem; }
        .card-amount { font-size: 1.8rem; font-weight: 700; margin-bottom: 5px; }
        .card-footer { font-size: 0.85rem; color: var(--text-muted); }

        /* Goals */
        .goals-container { margin-bottom: 40px; background-color: var(--bg-card); padding: 25px; border-radius: var(--border-radius); box-shadow: var(--shadow); cursor: pointer; border: 1px solid transparent; }
        .goals-container:hover { border-color: var(--goal); }
        .goal-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .progress-bar-bg { width: 100%; height: 12px; background-color: var(--bg-input); border-radius: 6px; overflow: hidden; margin-top: 15px; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--goal), #a78bfa); width: 0%; transition: width 0.5s ease-out; }
        .goal-stats { margin-top: 10px; display: flex; justify-content: space-between; font-size: 0.9rem; color: var(--text-muted); }

        /* Debts */
        .debts-summary { background-color: var(--bg-card); padding: 25px; border-radius: var(--border-radius); box-shadow: var(--shadow); margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--danger); }
        .debts-info h3 { font-size: 1.3rem; margin-bottom: 5px; }
        .debts-total { font-size: 1.8rem; font-weight: 700; color: var(--danger); text-align: right; }
        .debts-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .debt-card { background-color: var(--bg-card); padding: 20px; border-radius: var(--border-radius); box-shadow: var(--shadow); border: 1px solid #334155; }
        .debt-actions { display: flex; gap: 10px; margin-top: 15px; }

        /* Modals */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal { background-color: var(--bg-card); padding: 30px; border-radius: var(--border-radius); width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5); transform: scale(0.95); transition: transform 0.3s; }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .close-modal { background: none; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }

        /* Forms & Buttons - Layout Corregido */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input, .form-select { 
            width: 100%; 
            padding: 14px; 
            background-color: var(--bg-input); 
            border: 1px solid #475569; 
            border-radius: 8px; 
            color: var(--text-main); 
            font-size: 1rem; 
            outline: none; 
            margin-bottom: 10px; /* Espacio entre inputs */
        }
        .form-input:focus, .form-select:focus { border-color: var(--accent); }
        .btn { padding: 14px 20px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.95rem; width: 100%; }
        .btn-primary { background-color: var(--accent); color: white; }
        .btn-success { background-color: var(--success); color: white; }
        .btn-danger { background-color: var(--danger); color: white; }
        
        /* Tabs & Table */
        .account-tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px 15px; position: relative; font-size: 1rem; }
        .tab-btn.active { color: var(--text-main); font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -11px; left: 0; width: 100%; height: 2px; background: var(--accent); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .csv-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.9rem; color: var(--text-muted); }
        .csv-table th, .csv-table td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        .csv-table th { color: var(--text-main); font-weight: 600; }
        .amount-pos { color: var(--success); }
        .amount-neg { color: var(--danger); }

        /* Config & Toast */
        .config-list { list-style: none; }
        .config-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; }
        .toast-container { position: fixed; bottom: 20px; right: 20px; z-index: 2000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background-color: var(--bg-card); border-left: 4px solid var(--accent); padding: 15px 20px; border-radius: 4px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); display: flex; align-items: center; gap: 12px; animation: slideIn 0.3s ease-out; min-width: 250px; }
        .toast.success { border-color: var(--success); }
        .toast.error { border-color: var(--danger); }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fa-solid fa-sack-dollar"></i> IronMoney
        </div>
        <button class="settings-btn" onclick="openSettings()">
            <i class="fa-solid fa-gear"></i>
        </button>
    </header>

    <div class="container">

        <!-- Cuentas -->
        <div class="section-title">Mis Cuentas (Nichos)</div>
        <div class="accounts-grid" id="accountsContainer"></div>

        <!-- Metas -->
        <div class="section-title">Metas Financieras</div>
        <div id="goalsContainer"></div>

        <!-- Deudas -->
        <div class="section-title" style="margin-top: 40px;">Gestión de Deudas</div>
        <div class="debts-summary">
            <div class="debts-info">
                <h3>Deudas Totales ($)</h3>
                <p style="color:var(--text-muted); font-size:0.9rem;">Gestión de pasivos</p>
            </div>
            <div style="text-align: right;">
                <div class="debts-total" id="totalDebtDisplay">$0.00</div>
                <!-- Botón explícito para agregar deuda -->
                <button class="btn btn-danger" style="margin-top: 10px; width: auto; padding: 8px 15px; font-size: 0.8rem;" onclick="openAddDebtModal()">
                    <i class="fa-solid fa-plus"></i> Nueva Deuda
                </button>
            </div>
        </div>
        <div class="debts-list" id="debtsListContainer"></div>

    </div>

    <!-- ================= MODALES ================= -->

    <!-- Modal Cuenta -->
    <div class="modal-overlay" id="accountModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="accModalTitle">Cuenta</div>
                <button class="close-modal" onclick="closeModal('accountModal')">&times;</button>
            </div>
            
            <!-- ORDEN CAMBIADO: ACCIONES PRIMERO -->
            <div class="account-tabs">
                <button class="tab-btn active" onclick="switchTab('actions')">Acciones</button>
                <button class="tab-btn" onclick="switchTab('history')">Historial</button>
            </div>

            <!-- Tab Acciones (Activa por defecto) -->
            <div id="tab-actions" class="tab-content active">
                <!-- Ingreso -->
                <div class="form-group">
                    <label class="form-label">Ingresar Fondos</label>
                    <input type="number" id="addIncomeAmount" class="form-input" placeholder="Monto">
                    <input type="text" id="addIncomeConcept" class="form-input" placeholder="Concepto (ej. Nómina, Venta)">
                    <button class="btn btn-success" onclick="addIncome()"><i class="fa-solid fa-plus"></i> Agregar Ingreso</button>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

                <!-- Gasto -->
                <div class="form-group">
                    <label class="form-label">Crear Gasto</label>
                    <input type="number" id="addExpenseAmount" class="form-input" placeholder="Monto">
                    <input type="text" id="addExpenseConcept" class="form-input" placeholder="Concepto (ej. Comida, Servicio)">
                    <button class="btn btn-danger" onclick="addExpense()"><i class="fa-solid fa-minus"></i> Registrar Gasto</button>
                </div>

                <hr style="border: 0; border-top: 1px solid #334155; margin: 20px 0;">

                <!-- Transferencia -->
                <div class="form-group">
                    <label class="form-label">Transferir a otra cuenta</label>
                    <select id="transferTargetAccount" class="form-select"></select>
                    <input type="number" id="transferAmount" class="form-input" placeholder="Cantidad a enviar">
                    <input type="number" id="transferRate" class="form-input" placeholder="Tasa de cambio (si aplica)" style="display:none;">
                    <button class="btn btn-primary" onclick="initiateTransfer()"><i class="fa-solid fa-paper-plane"></i> Enviar Transferencia</button>
                    <small id="transferHint" style="color:var(--text-muted); display:block; margin-top:10px;"></small>
                </div>
            </div>

            <!-- Tab Historial -->
            <div id="tab-history" class="tab-content">
                <table class="csv-table">
                    <thead>
                        <tr>
                            <th>Fecha</th>
                            <th>Hora</th>
                            <th>Concepto</th>
                            <th>Monto</th>
                        </tr>
                    </thead>
                    <tbody id="accountHistoryBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Meta -->
    <div class="modal-overlay" id="goalModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title" id="goalModalTitle">Meta</div>
                <button class="close-modal" onclick="closeModal('goalModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Añadir fondos (Solo $ o USDT)</label>
                <select id="goalSourceAccount" class="form-select"></select>
            </div>
            <div class="form-group">
                <input type="number" id="goalAmount" class="form-input" placeholder="¿Cuánto añadir? ($)">
            </div>
            <button class="btn btn-primary" onclick="addToGoal()">Añadir a Meta</button>
        </div>
    </div>

    <!-- Modal Abonar Deuda -->
    <div class="modal-overlay" id="payDebtModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Abonar Deuda</div>
                <button class="close-modal" onclick="closeModal('payDebtModal')">&times;</button>
            </div>
            <input type="hidden" id="activeDebtId">
            <div class="form-group">
                <label class="form-label">¿De qué cuenta sale el dinero? (Solo $ o USDT)</label>
                <select id="debtSourceAccount" class="form-select"></select>
            </div>
            <div class="form-group">
                <input type="number" id="debtPayAmount" class="form-input" placeholder="Monto a abonar ($)">
            </div>
            <button class="btn btn-success" onclick="payDebt()">Abonar</button>
        </div>
    </div>

    <!-- Modal Nueva Deuda -->
    <div class="modal-overlay" id="newDebtModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Agregar Nueva Deuda ($)</div>
                <button class="close-modal" onclick="closeModal('newDebtModal')">&times;</button>
            </div>
            <div class="form-group">
                <label class="form-label">Nombre de la Deuda</label>
                <input type="text" id="newDebtName" class="form-input" placeholder="Ej. Préstamo Banco">
            </div>
            <div class="form-group">
                <label class="form-label">Monto Total en Dólares ($)</label>
                <input type="number" id="newDebtAmount" class="form-input" placeholder="0.00">
            </div>
            <button class="btn btn-danger" onclick="createNewDebt()">Crear Deuda</button>
        </div>
    </div>

    <!-- Modal Configuración -->
    <div class="modal-overlay" id="configModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">Configuración</div>
                <button class="close-modal" onclick="closeModal('configModal')">&times;</button>
            </div>
            <h3>Gestión de Cuentas</h3>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <input type="text" id="newAccountName" class="form-input" placeholder="Nombre cuenta">
                <select id="newAccountCurrency" class="form-select" style="width:100px;">
                    <option value="$">$</option>
                    <option value="BS">BS</option>
                    <option value="USDT">USDT</option>
                </select>
                <button class="btn btn-success" onclick="addAccount()">+</button>
            </div>
            <ul class="config-list" id="configAccountsList" style="margin-top:15px;"></ul>

            <h3 style="margin-top:30px;">Gestión de Metas ($)</h3>
            <div style="margin-top:10px; display:flex; gap:10px;">
                <input type="text" id="newGoalName" class="form-input" placeholder="Nombre meta">
                <input type="number" id="newGoalTarget" class="form-input" placeholder="Meta ($)" style="width:120px;">
                <button class="btn btn-success" onclick="addGoal()">+</button>
            </div>
            <ul class="config-list" id="configGoalsList" style="margin-top:15px;"></ul>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // --- ESTADO INICIAL (ORDEN CORREGIDO: BS PRIMERO) ---
        const defaultState = {
            accounts: [
                { id: 1, name: 'Efectivo', balance: 0, currency: 'BS' }, // Primera
                { id: 2, name: 'Banco', balance: 0, currency: '$' },
                { id: 3, name: 'USDT', balance: 0, currency: 'USDT' }
            ],
            transactions: [],
            goals: [
                { id: 1, name: 'Meta Inicial', target: 1500, current: 0 }
            ],
            debts: []
        };

        let state = JSON.parse(localStorage.getItem('ironMoneyState')) || defaultState;
        let currentAccountId = null; 
        let currentGoalId = null;

        function saveState() {
            localStorage.setItem('ironMoneyState', JSON.stringify(state));
            renderAll();
        }

        function renderAll() {
            renderAccounts();
            renderGoals();
            renderDebts();
            renderConfig();
        }

        function formatMoney(amount, currency) {
            return `${currency} ${parseFloat(amount).toFixed(2)}`;
        }

        // --- CUENTAS ---
        function renderAccounts() {
            const container = document.getElementById('accountsContainer');
            container.innerHTML = '';
            
            state.accounts.forEach(acc => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openAccountModal(acc.id);
                
                let icon = 'fa-wallet';
                if(acc.currency === 'USDT' || acc.currency === '$') icon = 'fa-dollar-sign';
                if(acc.currency === 'BS') icon = 'fa-money-bill-wave';

                card.innerHTML = `
                    <div class="card-header">
                        <span class="card-title">${acc.name}</span>
                        <i class="fa-solid ${icon} card-icon"></i>
                    </div>
                    <div class="card-amount">${formatMoney(acc.balance, acc.currency)}</div>
                    <div class="card-footer">Click para gestionar</div>
                `;
                container.appendChild(card);
            });
        }

        // --- METAS ---
        function renderGoals() {
            const container = document.getElementById('goalsContainer');
            container.innerHTML = '';

            state.goals.forEach(goal => {
                const percentage = Math.min(100, (goal.current / goal.target) * 100).toFixed(1);
                
                const div = document.createElement('div');
                div.className = 'goals-container';
                div.onclick = () => openGoalModal(goal.id);
                div.innerHTML = `
                    <div class="goal-header">
                        <div class="goal-info">
                            <h3>${goal.name}</h3>
                            <p>Meta: $${goal.target}</p>
                        </div>
                        <div class="goal-stats"><span>${percentage}%</span></div>
                    </div>
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" style="width: ${percentage}%"></div>
                    </div>
                    <div class="goal-stats">
                        <span>Generado: $${goal.current.toFixed(2)}</span>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // --- DEUDAS ---
        function renderDebts() {
            const listContainer = document.getElementById('debtsListContainer');
            const totalDisplay = document.getElementById('totalDebtDisplay');
            listContainer.innerHTML = '';

            const totalDebt = state.debts.reduce((sum, debt) => sum + (debt.total - debt.paid), 0);
            totalDisplay.innerText = `$${totalDebt.toFixed(2)}`;

            state.debts.forEach(debt => {
                const remaining = debt.total - debt.paid;
                const div = document.createElement('div');
                div.className = 'debt-card';
                div.innerHTML = `
                    <div class="debt-header">
                        <h3>${debt.name}</h3>
                        <i class="fa-solid fa-file-invoice-dollar" style="color:var(--text-muted)"></i>
                    </div>
                    <div class="debt-amount">$${remaining.toFixed(2)}</div>
                    <span class="debt-date">Creada: ${new Date(debt.date).toLocaleDateString()}</span>
                    <div class="debt-actions">
                        <button class="btn btn-success" style="flex:1" onclick="openPayDebtModal(${debt.id})">Abonar</button>
                        <button class="btn btn-danger" onclick="deleteDebt(${debt.id})"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                listContainer.appendChild(div);
            });
        }

        // --- CONFIGURACIÓN ---
        function renderConfig() {
            const accList = document.getElementById('configAccountsList');
            accList.innerHTML = '';
            state.accounts.forEach(acc => {
                accList.innerHTML += `
                    <li class="config-item">
                        <span>${acc.name} (${acc.currency})</span>
                        <button class="btn btn-danger" style="padding:5px 10px; font-size:0.8rem;" onclick="deleteAccount(${acc.id})">Eliminar</button>
                    </li>
                `;
            });

            const goalList = document.getElementById('configGoalsList');
            goalList.innerHTML = '';
            state.goals.forEach(goal => {
                goalList.innerHTML += `
                    <li class="config-item">
                        <span>${goal.name} ($${goal.target})</span>
                        <button class="btn btn-danger" style="padding:5px 10px; font-size:0.8rem;" onclick="deleteGoal(${goal.id})">X</button>
                    </li>
                `;
            });
        }

        // --- INTERACCIÓN CUENTAS (INGRESOS/GASTOS) ---
        function openAccountModal(id) {
            currentAccountId = id;
            const acc = state.accounts.find(a => a.id === id);
            document.getElementById('accModalTitle').innerText = acc.name;
            
            // Llenar select de transferencia con TODAS las cuentas (menos la actual)
            const select = document.getElementById('transferTargetAccount');
            select.innerHTML = '';
            state.accounts.filter(a => a.id !== id).forEach(a => {
                select.innerHTML += `<option value="${a.id}" data-currency="${a.currency}">${a.name} (${a.currency})</option>`;
            });

            select.onchange = updateTransferUI;
            document.getElementById('transferAmount').oninput = updateTransferUI;

            renderAccountHistory(id);
            updateTransferUI();
            
            // Resetear a la pestaña Acciones
            switchTab('actions');
            openModal('accountModal');
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tabName}`).classList.add('active');
            
            // Buscar botón por texto o índice, aquí por simplificación de orden:
            const btns = document.querySelectorAll('.tab-btn');
            if(tabName === 'actions') btns[0].classList.add('active');
            if(tabName === 'history') btns[1].classList.add('active');
        }

        function renderAccountHistory(id) {
            const tbody = document.getElementById('accountHistoryBody');
            tbody.innerHTML = '';
            
            const history = state.transactions.filter(t => t.accountId === id).sort((a,b) => new Date(b.date) - new Date(a.date));

            history.forEach(t => {
                const isIncome = t.type === 'income';
                const isTransferIn = t.type === 'transfer_in';
                const isExpense = t.type === 'expense';
                const isTransferOut = t.type === 'transfer_out';

                let colorClass = '';
                let sign = '';

                if (isIncome || isTransferIn) {
                    colorClass = 'amount-pos';
                    sign = '+';
                } else if (isExpense || isTransferOut) {
                    colorClass = 'amount-neg';
                    sign = '-';
                }

                tbody.innerHTML += `
                    <tr>
                        <td>${t.date}</td>
                        <td>${t.time}</td>
                        <td>${t.concept}</td>
                        <td class="${colorClass}">${sign} ${t.amount.toFixed(2)} ${t.currency}</td>
                    </tr>
                `;
            });
        }

        function logTransaction(accountId, type, concept, amount, currency) {
            const now = new Date();
            state.transactions.push({
                id: Date.now(),
                date: now.toLocaleDateString(),
                time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                accountId,
                type,
                concept,
                amount,
                currency
            });
        }

        function addIncome() {
            const amount = parseFloat(document.getElementById('addIncomeAmount').value);
            const concept = document.getElementById('addIncomeConcept').value;
            
            if(!amount || !concept) return showToast('Ingresa monto y concepto', 'error');

            const acc = state.accounts.find(a => a.id === currentAccountId);
            if (!acc) return;

            acc.balance += amount;
            logTransaction(currentAccountId, 'income', concept, amount, acc.currency);
            
            document.getElementById('addIncomeAmount').value = '';
            document.getElementById('addIncomeConcept').value = '';
            
            saveState();
            renderAccountHistory(currentAccountId);
            showToast('Ingreso registrado');
        }

        function addExpense() {
            const amount = parseFloat(document.getElementById('addExpenseAmount').value);
            const concept = document.getElementById('addExpenseConcept').value;
            
            if(!amount || !concept) return showToast('Ingresa monto y concepto', 'error');

            const acc = state.accounts.find(a => a.id === currentAccountId);
            if (!acc) return;

            if(acc.balance < amount) return showToast('Fondos insuficientes', 'error');

            acc.balance -= amount;
            logTransaction(currentAccountId, 'expense', concept, amount, acc.currency);

            document.getElementById('addExpenseAmount').value = '';
            document.getElementById('addExpenseConcept').value = '';
            
            saveState();
            renderAccountHistory(currentAccountId);
            showToast('Gasto registrado');
        }

        // --- TRANSFERENCIAS (CORREGIDO: TODAS LAS CUENTAS) ---
        function updateTransferUI() {
            const acc = state.accounts.find(a => a.id === currentAccountId);
            const targetSelect = document.getElementById('transferTargetAccount');
            const rateInput = document.getElementById('transferRate');
            const hint = document.getElementById('transferHint');
            
            if(targetSelect.options.length === 0) return;

            const targetCurrency = targetSelect.options[targetSelect.selectedIndex].getAttribute('data-currency');
            const srcCurrency = acc.currency;

            if ((srcCurrency === 'USDT' && targetCurrency === '$') || (srcCurrency === '$' && targetCurrency === 'USDT')) {
                rateInput.style.display = 'none';
                rateInput.value = 1;
                hint.innerText = 'Tasa de cambio fija: 1 a 1';
                hint.style.color = 'var(--text-muted)';
            } else if (srcCurrency === targetCurrency) {
                rateInput.style.display = 'none';
                hint.innerText = 'Transferencia misma moneda';
            } else {
                rateInput.style.display = 'block';
                rateInput.value = '';
                if (srcCurrency === 'BS') {
                    hint.innerText = `¿Cuántos ${srcCurrency} vale 1 ${targetCurrency}?`;
                } else {
                    hint.innerText = `¿Cuántos ${targetCurrency} vale 1 ${srcCurrency}?`;
                }
                hint.style.color = 'var(--accent)';
            }
        }

        function initiateTransfer() {
            const amount = parseFloat(document.getElementById('transferAmount').value);
            const rate = parseFloat(document.getElementById('transferRate').value);
            const targetId = parseInt(document.getElementById('transferTargetAccount').value);
            
            if(!amount || amount <= 0) return showToast('Ingresa un monto válido', 'error');

            const srcAcc = state.accounts.find(a => a.id === currentAccountId);
            const destAcc = state.accounts.find(a => a.id === targetId);

            if(srcAcc.balance < amount) return showToast('Saldo insuficiente en origen', 'error');

            let amountToSend = amount;
            let amountToReceive = amount;
            let concept = `Transferencia a ${destAcc.name}`;
            let conceptDest = `Transferencia desde ${srcAcc.name}`;

            if ((srcAcc.currency === 'USDT' && destAcc.currency === '$') || (srcAcc.currency === '$' && destAcc.currency === 'USDT')) {
                // 1 a 1
            } else if (srcAcc.currency === 'BS' && destAcc.currency !== 'BS') {
                if(!rate || rate <= 0) return showToast('Ingresa la tasa de cambio', 'error');
                amountToReceive = amountToSend / rate;
            } else if (srcAcc.currency !== 'BS' && destAcc.currency === 'BS') {
                if(!rate || rate <= 0) return showToast('Ingresa la tasa de cambio', 'error');
                amountToReceive = amountToSend * rate;
            } else if (srcAcc.currency === destAcc.currency) {
                amountToReceive = amountToSend;
            } else {
                if(!rate || rate <= 0) return showToast('Ingresa la tasa de cambio', 'error');
                amountToReceive = amountToSend / rate;
            }

            srcAcc.balance -= amountToSend;
            destAcc.balance += amountToReceive;

            logTransaction(srcAcc.id, 'transfer_out', concept, amountToSend, srcAcc.currency);
            logTransaction(destAcc.id, 'transfer_in', conceptDest, amountToReceive, destAcc.currency);

            document.getElementById('transferAmount').value = '';
            document.getElementById('transferRate').value = '';
            saveState();
            renderAccountHistory(currentAccountId);
            showToast('Transferencia exitosa');
        }

        // --- GESTIÓN DE METAS (Solo $ / USDT) ---
        function openGoalModal(id) {
            currentGoalId = id;
            const goal = state.goals.find(g => g.id === id);
            document.getElementById('goalModalTitle').innerText = goal.name;

            const select = document.getElementById('goalSourceAccount');
            select.innerHTML = '';
            
            // FILTRO: Solo $ y USDT
            const allowedAccounts = state.accounts.filter(a => a.currency === '$' || a.currency === 'USDT');
            
            if (allowedAccounts.length === 0) {
                select.innerHTML = '<option>No tienes cuentas en $ o USDT</option>';
            } else {
                allowedAccounts.forEach(acc => {
                    select.innerHTML += `<option value="${acc.id}">${acc.name} (${acc.currency})</option>`;
                });
            }

            openModal('goalModal');
        }

        function addToGoal() {
            const amount = parseFloat(document.getElementById('goalAmount').value);
            const sourceId = parseInt(document.getElementById('goalSourceAccount').value);
            
            if(!amount) return showToast('Ingresa monto', 'error');
            
            const acc = state.accounts.find(a => a.id === sourceId);

            if(!acc || (acc.currency !== '$' && acc.currency !== 'USDT')) {
                return showToast('Solo se permiten cuentas en Dólares o USDT', 'error');
            }

            if(acc.balance < amount) return showToast(`Fondos insuficientes en ${acc.name}`, 'error');

            const goal = state.goals.find(g => g.id === currentGoalId);

            acc.balance -= amount;
            logTransaction(sourceId, 'expense', `Aporte a meta: ${goal.name}`, amount, acc.currency);
            goal.current += amount; 
            
            document.getElementById('goalAmount').value = '';
            saveState();
            closeModal('goalModal');
            showToast('Fondos añadidos a la meta');
        }

        // --- GESTIÓN DE DEUDAS (Solo $ / USDT) ---
        function openAddDebtModal() {
            document.getElementById('newDebtName').value = '';
            document.getElementById('newDebtAmount').value = '';
            openModal('newDebtModal');
        }

        function createNewDebt() {
            const name = document.getElementById('newDebtName').value;
            const amount = parseFloat(document.getElementById('newDebtAmount').value);
            
            if(!name || !amount) return showToast('Completa los campos', 'error');

            state.debts.push({
                id: Date.now(),
                name: name,
                total: amount,
                paid: 0,
                date: new Date().toISOString()
            });
            saveState();
            closeModal('newDebtModal');
            showToast('Deuda registrada en $');
        }

        function deleteDebt(id) {
            if(confirm('¿Eliminar esta deuda?')) {
                state.debts = state.debts.filter(d => d.id !== id);
                saveState();
            }
        }

        function openPayDebtModal(id) {
            const debtId = id; 
            document.getElementById('activeDebtId').value = debtId;
            
            const select = document.getElementById('debtSourceAccount');
            select.innerHTML = '';
            
            // FILTRO: Solo $ y USDT
            const allowedAccounts = state.accounts.filter(a => a.currency === '$' || a.currency === 'USDT');

            if (allowedAccounts.length === 0) {
                select.innerHTML = '<option>No tienes cuentas en $ o USDT</option>';
            } else {
                allowedAccounts.forEach(acc => {
                    select.innerHTML += `<option value="${acc.id}">${acc.name} (${acc.currency})</option>`;
                });
            }

            document.getElementById('debtPayAmount').value = '';
            openModal('payDebtModal');
        }

        function payDebt() {
            const debtId = parseInt(document.getElementById('activeDebtId').value);
            const sourceId = parseInt(document.getElementById('debtSourceAccount').value);
            const amount = parseFloat(document.getElementById('debtPayAmount').value);

            if(!amount) return showToast('Ingresa monto', 'error');

            const debt = state.debts.find(d => d.id === debtId);
            const acc = state.accounts.find(a => a.id === sourceId);

            if(!acc || (acc.currency !== '$' && acc.currency !== 'USDT')) {
                return showToast('Solo se permiten cuentas en Dólares o USDT', 'error');
            }

            if(acc.balance < amount) return showToast('Fondos insuficientes', 'error');
            if((debt.total - debt.paid) < amount) return showToast('Estás pagando más de lo debido', 'error');

            acc.balance -= amount;
            debt.paid += amount;
            
            logTransaction(sourceId, 'expense', `Abono deuda: ${debt.name}`, amount, acc.currency);

            saveState();
            closeModal('payDebtModal');
            showToast('Deuda abonada correctamente');
        }

        // --- UTILIDADES ---
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        function openSettings() { openModal('configModal'); }

        function addAccount() {
            const name = document.getElementById('newAccountName').value;
            const currency = document.getElementById('newAccountCurrency').value;
            if(!name) return showToast('Falta nombre', 'error');
            state.accounts.push({ id: Date.now(), name: name, balance: 0, currency: currency });
            document.getElementById('newAccountName').value = '';
            saveState();
            showToast('Cuenta creada');
        }
        function deleteAccount(id) {
            if(confirm('¿Eliminar cuenta y sus datos?')) {
                state.accounts = state.accounts.filter(a => a.id !== id);
                saveState();
            }
        }
        function addGoal() {
            const name = document.getElementById('newGoalName').value;
            const target = parseFloat(document.getElementById('newGoalTarget').value);
            if(!name || !target) return showToast('Datos incompletos', 'error');
            state.goals.push({ id: Date.now(), name: name, target: target, current: 0 });
            document.getElementById('newGoalName').value = '';
            document.getElementById('newGoalTarget').value = '';
            saveState();
            showToast('Meta creada');
        }
        function deleteGoal(id) {
            state.goals = state.goals.filter(g => g.id !== id);
            saveState();
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            let icon = type === 'success' ? '<i class="fa-solid fa-check-circle"></i>' : '<i class="fa-solid fa-exclamation-circle"></i>';
            toast.innerHTML = `${icon} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        renderAll();
    </script>
</body>
</html>
